<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="white" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- Gradient background -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- Gloss shine (top half) -->
  <rect width="120" height="68" fill="url(#sh)" clip-path="url(#clip)"/>

  <!-- H — left vertical bar -->
  <rect x="18" y="20" width="22" height="80" rx="7" fill="white" fill-opacity="0.95"/>
  <!-- H — right vertical bar -->
  <rect x="80" y="20" width="22" height="80" rx="7" fill="white" fill-opacity="0.95"/>
  <!-- H — horizontal crossbar -->
  <rect x="18" y="50" width="84" height="21" rx="7" fill="white" fill-opacity="0.95"/>

  <!-- Subtle inner border for depth -->
  <rect width="120" height="120" rx="26"
    fill="none" stroke="black" stroke-opacity="0.07" stroke-width="2"/>
</svg>
