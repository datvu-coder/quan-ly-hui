<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#c2410c" flood-opacity="0.4"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Top shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)" clip-path="url(#round)"/>

  <!-- Coin ring outer -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
  <!-- Coin ring inner -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Letter H — bold, white -->
  <text
    x="256" y="340"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="280"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-8"
    clip-path="url(#round)"
  >H</text>

  <!-- Small "ui" subscript -->
  <text
    x="336" y="370"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="90"
    font-weight="700"
    fill="#ffffff"
    fill-opacity="0.75"
    text-anchor="middle"
  >ui</text>

  <!-- Bottom label -->
  <text
    x="256" y="460"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="600"
    fill="#ffffff"
    fill-opacity="0.60"
    text-anchor="middle"
    letter-spacing="8"
  >PRO</text>
</svg>
