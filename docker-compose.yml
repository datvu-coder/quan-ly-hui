services:
  app:
    build:
      context: .
      args:
        # Nhúng API key vào JS bundle khi build
        VITE_API_SECRET: ${API_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - hui_data:/data   # dữ liệu lưu vĩnh viễn, không mất khi rebuild
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - API_SECRET=${API_SECRET:-}

volumes:
  hui_data:
    driver: local
